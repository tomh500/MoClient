//DearMoments_User     正常情况下选用此选项
//DearMoments_Debug    只有开发者会感兴趣
DearMoments_Debug

//DearMoments_TextOutput_CW        输出到无线电
//DearMoments_TextOutput_Team      输出到队伍
//DearMoments_TextOutput_All       输出到全体
//DearMoments_TextOutput_Echo      输出到控制台
//DearMoments_TextOutput_Null      不输出
DearMoments_TextOutput_CW


//DearMoments_Desubtick_Enable     全局启用Desubtick，使得手感更像CSGO
//DearMoments_Desubtick_Disable    全局禁用Desubtick，CS2原汁原味手感
DearMoments_Desubtick_Enable

//DearMoments_Autostop_pass            使用Momot
//DearMoments_Autostop_sideload        停用Momot以至于可以使用外置急停，谨慎使用
DearMoments_Autostop_pass
    //当只有DearMoments_Autostop_sideload时，以下选项才会生效
    //特别说明：本档位由外置急停代码提供，SqaureTeam不接受任何关于本功能的反馈
    //autostop_mode_1       64~100fps急停档位
    //autostop_mode_2       100~165fps急停档位
    //autostop_mode_3       165~280fps急停档位
    //autostop_mode_4       280fps以上急停档位
    autostop_mode_3
    //Autostop_Smart        智能关闭急停功能
    //Autostop_Stupid       任何情况都不自动关闭急停
    Autostop_Smart
    

//前后移动方式
//MoMot_fb_Normal       正常移动
//MoMot_fb_SOCD         后覆盖移动（Snaptap）
//MoMot_fb_NullBind     单次后覆盖移动（Nullbind）
MoMot_fb_SOCD

//左右移动方式
//MoMot_rl_Normal       正常移动
//MoMot_rl_SOCD         后覆盖移动（Snaptap）
//MoMot_rl_NullBind     单次后覆盖移动（Nullbind）
MoMot_rl_SOCD

//MoMot_MW_A        正常滚轮跳
//MoMot_MW_B        Desubtick滚轮跳
//MoMot_MW_C        MouseXY滚轮跳
MoMot_MW_B

//DearMoments_Mwheelup_Jump        上滚轮跳
//DearMoments_Mwhellup_slot        上滚轮切换物品栏
DearMoments_Mwheelup_Jump

//DearMoments_Mwheelup_Jump     下滚轮跳
//DearMoments_Mwhelldown_slot      下滚轮切换物品栏
DearMoments_Mwheeldown_Jump

//DearMoments_CrosshairRecoil_Enable       默认开启准星跟随
//DearMoments_CrosshairRecoil_Disable      默认关闭准星跟随
DearMoments_CrosshairRecoil_Disable

//DearMoments_BetterBhop_Enable        开启连跳增强
//DearMoments_BetterBhop_Disable       关闭连跳增强
DearMoments_BetterBhop_Enable

//DearMoments_AutoBhop_Enable          开启自动连跳
//DearMoments_AutoBhop_Disable         关闭自动连跳
DearMoments_AutoBhop_Enable

//DearMoments_SoundTips_Enable         开启声音提示
//DearMoments_SoundTips_Disable        关闭声音提示
DearMoments_SoundTips_Enable 

