bind w +DearMoments_bind_forward   //你的前进按键

bind s +DearMoments_bind_back      //你的后退按键

bind a +DearMoments_bind_left      //你的左移按键

bind d +DearMoments_bind_right     //你的右移按键

bind key +huifuButton1          //当启用外置急停的时候，按下可以临时开关急停

bind 1 +DearMoments_bind_slot1     //主武器

bind 2 +DearMoments_bind_slot2     //副武器

bind 3 +DearMoments_bind_slot3     //近战武器

bind 4 +DearMoments_bind_slot4     //投掷物

bind 5 +DearMoments_bind_slot5     //C4炸弹

bind g +DearMoments_bind_drop      //丢掉当前物品

bind q +DearMoments_bind_lastslot      //上一个物品

bind key +DearMoments_bind_slotgra     //高爆手雷 

bind key +DearMoments_bind_slotflash     //闪光弹

bind key +DearMoments_bind_slotsmoke     //烟雾弹

bind key +DearMoments_bind_slotmolo     //燃烧弹

bind key +DearMoments_bind_slotdecoy     //诱饵弹

bind key +DearMoments_bind_health     //治疗针

bind mouse1 +DearMoments_bind_attack       //你的开火键

bind mouse2 +DearMoments_bind_attack2      //你的第二开火键

bind space +DearMoments_bind_spacejump     //你的跳跃键

bind shift +DearMoments_bind_sprint      //你的静步键

bind ctrl +DearMoments_bind_duck         //你的下蹲键

bind key +DearMoments_bind_radialradio   //打开1号轮盘

bind c +DearMoments_bind_radialradio2   //打开2号轮盘

bind key +DearMoments_bind_radialradio3   //打开3号轮盘

bind tab +DearMoments_bind_showscores      //打开计分板

bind t +DearMoments_bind_spray_menu        //打开喷漆菜单

bind key +DearMoments_bind_quickinv        //打开放射性武器菜单

bind mwheelup +DearMoments_bind_mwheelup   //如果需要关闭滚轮跳，请前往UserSetting.cfg更改

bind mwheeldown +DearMoments_bind_mwheeldown   //如果需要关闭滚轮跳，请前往UserSetting.cfg更改

bind key CrosshairRecoilSW     //准星跟随快捷切换

bind key +antiflash      //一键背闪、使用外置急停可能不兼容

bind key start_spinbot    //自动旋转（Beta）、使用外置急停可能不兼容

bind key JumpThrow      //跳投

bind key +WJumpThrow    //W+跳投

bind key /RapidFire       //单发武器自动化开关切换

bind key say_team !drop       //部分平台快捷发刀

bind key say_team !pause       //部分平台暂停

bind key say_team !unpause      //部分平台取消暂停

bind key say_team .hp       //5E平台查询血量

bind / DearMoments_Reload      //重置DearMoments 出现问题可以按下