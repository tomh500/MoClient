//Square_User     正常情况下选用此选项
//Square_Debug    只有开发者会感兴趣
Square_Debug

//Square_TextOutput_CW        输出到无线电
//Square_TextOutput_Team      输出到队伍
//Square_TextOutput_All       输出到全体
//Square_TextOutput_Echo      输出到控制台
//Square_TextOutput_Null      不输出
Square_TextOutput_CW


//Square_Desubtick_Enable     全局启用Desubtick，使得手感更像CSGO
//Square_Desubtick_Disable    全局禁用Desubtick，CS2原汁原味手感
Square_Desubtick_Enable

//Square_Autostop_f_pass       禁用前方向的单键急停
//Square_Autostop_f_load       启用前方向的单键急停
Square_Autostop_f_load

//Square_Autostop_b_pass       禁用后方向的单键急停
//Square_Autostop_b_load       启用后方向的单键急停
Square_Autostop_b_load

//Square_Autostop_r_pass       禁用右方向的单键急停
//Square_Autostop_r_load       启用右方向的单键急停
Square_Autostop_r_load

//Square_Autostop_l_pass       禁用左方向的单键急停
//Square_Autostop_l_load       启用左方向的单键急停
Square_Autostop_l_load

//当只有启用了任意方向的单键急停时，以下选项才会生效
//autostop_mode_1       64~80fps急停档位
//autostop_mode_2       80~100fps急停档位
//autostop_mode_3       100~120fps急停档位
//autostop_mode_4       120~144fps急停档位
//autostop_mode_4       144~180fps急停档位
//autostop_mode_5       180~240fps急停档位
//autostop_mode_6       220~320fps急停档位
//autostop_mode_7       300~540fps急停档位
autostop_mode_5

//Autostop_Smart        智能关闭急停功能
//Autostop_Stupid      任何情况都不自动关闭急停
Autostop_Smart
    

//前后移动方式
//MoMot_fb_Normal       正常移动
//MoMot_fb_SOCD         后覆盖移动（Snaptap）
//MoMot_fb_NullBind     单次后覆盖移动（Nullbind）
MoMot_fb_SOCD

//左右移动方式
//MoMot_rl_Normal       正常移动
//MoMot_rl_SOCD         后覆盖移动（Snaptap）
//MoMot_rl_NullBind     单次后覆盖移动（Nullbind）
MoMot_rl_SOCD

//MoMot_MW_A        正常滚轮跳
//MoMot_MW_B        Desubtick滚轮跳
//MoMot_MW_C        MouseXY滚轮跳
MoMot_MW_B

//Square_Mwheelup_Jump        上滚轮跳
//Square_Mwhellup_slot        上滚轮切换物品栏
Square_Mwheelup_Jump

//Square_Mwheelup_Jump     下滚轮跳
//Square_Mwhelldown_slot      下滚轮切换物品栏
Square_Mwheeldown_Jump

//Square_CrosshairRecoil_Enable       默认开启准星跟随
//Square_CrosshairRecoil_Disable      默认关闭准星跟随
Square_CrosshairRecoil_Disable

//Square_BetterBhop_Enable        开启连跳增强
//Square_BetterBhop_Disable       关闭连跳增强
Square_BetterBhop_Enable

//Square_AutoBhop_Enable          开启自动连跳
//Square_AutoBhop_Disable         关闭自动连跳
Square_AutoBhop_Enable

//Square_SoundTips_Enable         开启声音提示
//Square_SoundTips_Disable        关闭声音提示
Square_SoundTips_Enable

