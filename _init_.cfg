//RapidFire是单发武器自动化，通过本模块，可以按住鼠标自动开火
exec_async DearMoments/Ticker/_init_


alias RapidFire_Enable "alias +smartattack TakeAttackToRapidFire;alias -smartattack TakeAttackCancelRapidFire"
alias RapidFire_Disable "alias sq_6ms_2_cl;alias +smartattack +attack;alias -smartattack attack -1009 0 0"
alias +DearMoments_define_attack "fire_sensitivity;+smartattack;alias sq_6ms_4"
alias -DearMoments_define_attack "rec_sensitivity;-smartattack;spec_next"
alias +DearMoments_action_attack "+DearMoments_define_attack;alias sq_7"
alias -DearMoments_action_attack "-DearMoments_define_attack;alias sq_7"
alias +DearMoments_attack "alias sq_7 +DearMoments_action_attack"
alias -DearMoments_attack "alias sq_7 -DearMoments_action_attack"
alias +DM_bind_attack +DearMoments_attack
alias -DM_bind_attack -DearMoments_attack
alias +smartattack "+attack;"
alias -smartattack "attack -1009 0 0;"
alias smart_rapidfire_fps_low /fps_low
alias smart_rapidfire_fps_rec /fps_recovery

alias TakeAttackToRapidFireA "alias sq_6ms_2_cl fullattack_action;"
alias TakeAttackToRapidFire "TakeAttackToRapidFireA;"
alias TakeAttackCancelRapidFire "alias sq_6ms_2_cl;/fps_recovery;alias smart_rapidfire_fps_rec /fps_recovery"

bind mouse1 +DM_bind_attack